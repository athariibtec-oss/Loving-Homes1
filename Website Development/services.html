<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>الخدمات</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e6e6e6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 16px;
}

/* الشعار */
.logo{
    position:absolute;
    top:10px;
    left:10px;
    width:110px;
}

/* الهيدر */
header {
    text-align: center;
    padding: 20px;
    position:relative;
}

.nav-box {
    background: #d9d9d9;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.nav-btn {
    background: white;
    color: black;
    text-decoration: none;
    padding: 8px 18px;
    border: 1px solid #999;
    border-radius: 5px;
    font-weight: bold;
}

.lang-btn, .access-btn {
    background: white;
    border: 1px solid #999;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.access-btn {
    font-weight: bold;
}

.search-box {
    padding: 6px;
    border: 1px solid #999;
    border-radius: 5px;
}

.search-btn {
    padding: 6px 10px;
    border: 1px solid #999;
    background: white;
    cursor: pointer;
}

section {
    padding: 20px;
    flex: 1;
    background: #f2f2f2;
    margin: 20px;
    border: 1px solid #999;
}

.content-wrapper {
    display: flex;
    flex-direction: row-reverse;
    flex-wrap: wrap;
}

.content-wrapper p {
    flex: 1;
    line-height: 1.8;
    text-align: right;
    margin-left: 20px;
}

.content-wrapper video {
    flex: 1;
    border: 1px solid #999;
    border-radius: 5px;
    max-width: 560px;
    min-width: 300px;
    height: 315px;
    margin-right: 20px;
}

footer {
    text-align: center;
    padding: 15px;
    background: #d9d9d9;
}

mark {
    background: yellow;
}
</style>

<script>
let currentLang = localStorage.getItem("lang") || "ar";
let fontSize = localStorage.getItem("fontSize") || 16;

let textAr = "يقدم موقع Loving Homes مجموعة كبيرة من الخدمات المتخصصة في رعاية الكلاب داخل بيئة امنة ومريحة تم تصميم هذه الخدمات من اجل توفير افضل مستوى من العناية بالحيوانات الاليفة عندما يكون اصحابها مشغولين او غير قادرين على الاعتناء بها لفترة من الوقت يحرص فريق العمل في الفندق على الاهتمام بكل كلب بشكل فردي من خلال توفير اماكن اقامة مريحة ونظيفة تساعد الكلاب على الشعور بالراحة والهدوء خلال فترة اقامتها كما يوفر الفندق مناطق لعب داخلية وخارجية تسمح للكلاب بالحركة والنشاط بشكل مستمر مما يساعد على تحسين صحتها الجسدية والنفسية يقدم الموقع ايضا خدمة تمشية الكلاب في مناطق امنة تحت اشراف موظفين متخصصين في التعامل مع الحيوانات الاليفة كما تتوفر خدمات الحلاقة والتنظيف في صالة خاصة للعناية بمظهر الكلاب والمحافظة على نظافتها بشكل دائم اضافة الى ذلك يوفر الفندق خدمات بيطرية على مدار اليوم من اجل ضمان سلامة الحيوانات الاليفة وتقديم الرعاية الصحية اللازمة عند الحاجة يعمل فريق Loving Homes على مراقبة الحيوانات الاليفة بشكل مستمر وتقديم تقارير وصور يومية لاصحابها حتى يشعروا بالاطمئنان على حيواناتهم خلال فترة الاقامة يهدف الموقع الى تعريف العملاء بجميع الخدمات التي يقدمها الفندق ومساعدتهم على اختيار الخدمة المناسبة لاحتياجات كل كلب";

let textEn = "Loving Homes provides a wide range of professional services designed to care for dogs in a safe and comfortable environment the hotel focuses on providing the best level of care for pets when their owners are busy or unable to look after them for a period of time";

window.onload = function() {
    document.body.style.fontSize = fontSize + "px";
    applyLanguage();
};

function changeLanguage() {
    currentLang = currentLang === "ar" ? "en" : "ar";
    localStorage.setItem("lang", currentLang);
    applyLanguage();
}

function applyLanguage() {
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";

    document.getElementById("nav-home").innerText = currentLang === "ar" ? "الصفحة الرئيسية" : "Home";
    document.getElementById("nav-facilities").innerText = currentLang === "ar" ? "المرافق" : "Facilities";
    document.getElementById("nav-packages").innerText = currentLang === "ar" ? "الحزم" : "Packages";
    document.getElementById("nav-help").innerText = currentLang === "ar" ? "المساعدة" : "Help";
    document.getElementById("nav-services").innerText = currentLang === "ar" ? "خدماتنا" : "Services";
    document.getElementById("nav-contact").innerText = currentLang === "ar" ? "اتصل بنا" : "Contact";

    document.getElementById("title").innerText = currentLang === "ar" ? "خدمات فندق الكلاب" : "Dog Hotel Services";
    document.getElementById("content").innerText = currentLang === "ar" ? textAr : textEn;

    document.getElementById("btn-big").innerText = currentLang === "ar" ? "تكبير النص" : "Increase Text";
    document.getElementById("btn-small").innerText = currentLang === "ar" ? "تصغير النص" : "Decrease Text";

    document.getElementById("search").placeholder = currentLang === "ar" ? "بحث" : "Search";
}

function increaseFont() {
    fontSize = parseInt(fontSize) + 2;
    document.body.style.fontSize = fontSize + "px";
    localStorage.setItem("fontSize", fontSize);
}

function decreaseFont() {
    fontSize = Math.max(12, fontSize - 2);
    document.body.style.fontSize = fontSize + "px";
    localStorage.setItem("fontSize", fontSize);
}

function searchText() {
    let input = document.getElementById("search").value;
    let text = document.getElementById("content");
    let original = currentLang === "ar" ? textAr : textEn;

    if (input == "") {
        text.innerText = original;
        return;
    }

    let regex = new RegExp(input, "gi");
    text.innerHTML = original.replace(regex, function(match) {
        return "<mark>" + match + "</mark>";
    });
}
</script>

</head>

<body>

<header>

<img src="images/Image11.png" class="logo" alt="logo">

<h1 id="title">خدمات فندق الكلاب</h1>

<div class="nav-box">
<button class="lang-btn" onclick="changeLanguage()">🌐</button>
<button class="access-btn" id="btn-big" onclick="increaseFont()">تكبير النص</button>
<button class="access-btn" id="btn-small" onclick="decreaseFont()">تصغير النص</button>

<a href="index.html" class="nav-btn" id="nav-home">الصفحة الرئيسية</a>
<a href="facilities.html" class="nav-btn" id="nav-facilities">المرافق</a>
<a href="packages.html" class="nav-btn" id="nav-packages">الحزم</a>
<a href="help.html" class="nav-btn" id="nav-help">المساعدة</a>
<a href="services.html" class="nav-btn" id="nav-services">خدماتنا</a>
<a href="contact.html" class="nav-btn" id="nav-contact">اتصل بنا</a>

<input type="text" id="search" class="search-box" placeholder="بحث">
<button class="search-btn" onclick="searchText()">🔍</button>
</div>

</header>

<section>
<div class="content-wrapper">
<video src="images/Video .mp4" controls></video>
<p id="content"></p>
</div>
</section>

<footer>
<p>© 2026 Loving Homes</p>
</footer>

</body>
</html>
